# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 88e6384b-ea00-47bb-9e47-8d184984ed86

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "citibike_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405609172195069.9.azuredatabricks.net
    variables:
      catalog: citibike_dev
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    presets:
      name_prefix: '{testing} '
    workspace:
      host: https://adb-7405615297000638.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/marcmontgomery_az@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: citibike_test
      dev_flag: false
    permissions:
      - user_name: marcmontgomery_az@outlook.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://adb-7405607948273077.17.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/marcmontgomery_az@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: citibike_prod
      dev_flag: false
    permissions:
      - user_name: marcmontgomery_az@outlook.com
        level: CAN_MANAGE
